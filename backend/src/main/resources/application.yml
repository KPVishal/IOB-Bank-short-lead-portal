spring:
  application:
    name: iob-portal
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:false}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:iob_portal}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:iob}
    password: ${DB_PASSWORD:iobpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long-for-hs256-signing}
    access-token-expiry-minutes: ${JWT_EXPIRY_MINUTES:120}
  bootstrap:
    enabled: ${BOOTSTRAP_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  email:
    from: ${EMAIL_FROM:no-reply@bijlipay.local}
    from-name: ${EMAIL_FROM_NAME:Bijlipay IOB Portal}
    enabled: ${EMAIL_ENABLED:true}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  user-defaults:
    password: ${USER_DEFAULT_PASSWORD:Welcome@123}

logging:
  level:
    com.bijlipay.iob: DEBUG
    org.springframework.security: INFO
